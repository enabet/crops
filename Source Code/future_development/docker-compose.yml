services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cardi_platform}
      POSTGRES_USER: ${POSTGRES_USER:-cardi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cardi_dev_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cardi} -d ${POSTGRES_DB:-cardi_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*,localhost,127.0.0.1,backend,192.168.100.186,172.16.1.13}
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://192.168.100.186:5173,http://172.16.1.13:5173}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./backend:/app
      - backend-media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate_schemas --shared &&
             python manage.py bootstrap_demo_tenants &&
             python manage.py migrate_schemas &&
             if [ \"$${SEED_DEMO_DATA:-false}\" = \"true\" ]; then python manage.py seed_demo_data; fi &&
             python manage.py runserver 0.0.0.0:8000"

  celery:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - backend-media:/app/media
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A config worker -l info

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PORT: ${BACKEND_PORT:-8001}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres-data:
  backend-media:
  frontend-node-modules:
